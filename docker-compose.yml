version: '3.9'

services:
  # FastAPI backend - does the actual chord + beat analysis
  analyzer:
    build:
      context: ./analyzer
      dockerfile: Dockerfile
    container_name: chordscope-analyzer
    ports:
      - "8000:8000"
    volumes:
      # Recordings + analysis JSON files
      - ./data/recordings:/app/data/recordings
      # Cache for models (speeds up restarts)
      - analyzer-cache:/root/.cache
    environment:
      - PYTHONUNBUFFERED=1
      - RECORDINGS_PATH=/app/data/recordings
    restart: unless-stopped

  # Next.js frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # CRITICAL: Set this to how the BROWSER will reach the analyzer.
        # - For pure local Docker: http://localhost:8000   (most common for self-hosters)
        # - For nginx reverse proxy on same domain: /analyzer   (see README)
        # - For specific LAN IP: http://192.168.x.x:8000
        - NEXT_PUBLIC_ANALYZER_URL=http://localhost:8000
    container_name: chordscope-frontend
    ports:
      - "4000:3000"
    restart: unless-stopped

volumes:
  analyzer-cache:
    name: chordscope-analyzer-cache
