version: '3.9'

services:
  # FastAPI backend - does the actual chord + beat analysis
  analyzer:
    build:
      context: ./analyzer
      dockerfile: Dockerfile
    container_name: chordscope-analyzer
    ports:
      - "8000:8000"
    volumes:
      # Recordings + analysis JSON files
      - ./data/recordings:/app/data/recordings
      # Cache for models (speeds up restarts)
      - analyzer-cache:/root/.cache
    environment:
      - PYTHONUNBUFFERED=1
      - RECORDINGS_PATH=/app/data/recordings
    restart: unless-stopped

  # Next.js frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # This value is baked into the frontend bundle at build time
        - NEXT_PUBLIC_ANALYZER_URL=http://192.168.1.167:8000
    container_name: chordscope-frontend
    ports:
      - "4000:3000"
    restart: unless-stopped

volumes:
  analyzer-cache:
    name: chordscope-analyzer-cache
